# ============================================================================
# Nav2 ナビゲーション パラメータ設定 (Phase 4a)
# ============================================================================
# slam_toolbox が map→odom TF と /map を発行するため、
# AMCL / map_server は使用しない。
# VM ソフトウェアレンダリング環境向けに低負荷設定。
# ============================================================================

# --- BT Navigator ---
# Behavior Tree ベースのナビゲーション管理ノード
bt_navigator:
  ros__parameters:
    use_sim_time: true
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /odom
    bt_loop_duration: 10           # BT ティック間隔 [ms]
    default_server_timeout: 120    # アクションサーバータイムアウト [s]
    wait_for_service_timeout: 5    # サービス待機タイムアウト [s]
    action_server_result_timeout: 900.0
    navigators: ['navigate_to_pose', 'navigate_through_poses']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # ビルトイン BT プラグインは自動登録される (plugin_lib_names はカスタム用)
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code

# --- Controller Server (RPP: Regulated Pure Pursuit) ---
# 経路追従コントローラー。計算負荷が低く VM 向き
controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 5.0      # VM 低負荷設定 (10→5 Hz)
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    # ゴール到達判定
    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.25      # VM 環境向けに緩和 (0.15→0.25) [m]
      yaw_goal_tolerance: 0.25     # 向きの許容誤差 [rad]
      stateful: true

    # 進行状況チェック (スタック検知)
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0

    # RPP コントローラー設定
    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.25     # カバレッジ精度優先で減速 (0.3→0.25) [m/s]
      lookahead_dist: 0.4          # 精密追従 (0.6→0.4) [m]
      min_lookahead_dist: 0.2      # 狭い回廊でのスタック防止 [m]
      max_lookahead_dist: 0.9
      lookahead_time: 1.5
      rotate_to_heading_angular_vel: 0.5
      transform_tolerance: 0.1
      use_velocity_scaled_lookahead_dist: false
      min_approach_linear_velocity: 0.05
      approach_velocity_scaling_dist: 0.6
      use_collision_detection: true
      max_allowed_time_to_collision_up_to_carrot: 1.0
      use_regulated_linear_velocity_scaling: true
      use_cost_regulated_linear_velocity_scaling: false
      regulated_linear_scaling_min_radius: 0.9
      regulated_linear_scaling_min_speed: 0.25
      allow_reversing: false
      max_angular_accel: 3.2
      max_robot_pose_search_dist: 10.0

# --- Planner Server (SmacPlanner2D) ---
# グリッドベースの経路計画。A* ベースで高速
planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_smac_planner::SmacPlanner2D"
      tolerance: 0.125             # ゴール許容誤差 [m]
      downsample_costmap: false
      downsampling_factor: 1
      allow_unknown: true          # SLAM 未探索領域を通過許可
      max_iterations: 1000000
      max_on_approach_iterations: 1000
      max_planning_time: 5.0       # 最大計画時間 [s]
      cost_travel_multiplier: 2.0
      use_final_approach_orientation: false
      smoother:
        max_iterations: 1000
        w_smooth: 0.3
        w_data: 0.2
        tolerance: 1.0e-10

# --- Behavior Server ---
# リカバリー動作 (スピン、バック、待機)
behavior_server:
  ros__parameters:
    use_sim_time: true
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    wait:
      plugin: "nav2_behaviors::Wait"

# --- Waypoint Follower ---
# 複数ウェイポイントの順次追従 (Phase 4b で本格利用)
waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 200  # ウェイポイント到達時の一時停止 [ms]

# --- Global Costmap ---
# SLAM の /map トピックから生成。静的地図 + 障害物レイヤー
global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 1.0        # VM 低負荷設定 [Hz]
      publish_frequency: 1.0
      global_frame: map
      robot_base_frame: base_link
      robot_radius: 0.20           # ロボット半径 [m]
      resolution: 0.10             # VM 負荷軽減 (0.05→0.1) [m/cell]
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]

      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        enabled: true

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.5   # CPU 節約 [m]
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.40      # VM 向けに縮小 (0.55→0.40) [m]

# --- Local Costmap ---
# ロボット周囲のローリングウィンドウ。障害物回避用
local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 2.0        # VM 低負荷設定 [Hz]
      publish_frequency: 2.0
      global_frame: odom
      robot_base_frame: base_link
      robot_radius: 0.20
      rolling_window: true
      width: 3                     # ローリングウィンドウ幅 [m]
      height: 3                    # ローリングウィンドウ高さ [m]
      resolution: 0.10
      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          inf_is_valid: true

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.55

# --- Lifecycle Manager ---
# Nav2 ノード群の状態管理 (unconfigured → inactive → active)
lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    # VM 低速起動対応 (300秒)
    bond_timeout: 300.0
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - collision_monitor
