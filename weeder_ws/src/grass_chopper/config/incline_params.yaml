# ============================================================================
# 傾斜検知パラメータ設定 (Phase 4f)
# ============================================================================
# IMU データから傾斜レベルを判定し、危険な傾斜時に緊急停止する。
# ============================================================================

incline_monitor_node:
  ros__parameters:
    use_sim_time: True
    # 警告閾値 [度] — この角度以上で減速推奨ログを出力
    warning_deg: 15.0
    # 緊急停止閾値 [度] — この角度以上で /cmd_vel にゼロ速度を発行
    emergency_deg: 25.0
    # 監視周期 [Hz]
    check_frequency: 10.0
