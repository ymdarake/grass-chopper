# ============================================================================
# カバレッジ走行パラメータ設定 (Phase 4b)
# ============================================================================
# coverage_commander_node のパラメータ。
# region で指定した矩形領域を Boustrophedon パターンで走行する。
# ============================================================================

coverage_commander_node:
  ros__parameters:
    use_sim_time: true
    # カバレッジ対象領域 [min_x, min_y, max_x, max_y] (map 座標系)
    # coverage_test.world の 8m x 8m フィールド内、外壁から 1m バッファ
    region: [-3.0, -3.0, 3.0, 3.0]
    # 作業幅 [m] (ロボットの草刈り幅に合わせる)
    swath_width: 0.18
    # 境界マージン [m] (壁からの安全距離)
    margin: 0.3
    # 走行方向 [rad] (0 = 東西方向のストライプ)
    direction: 0.0
