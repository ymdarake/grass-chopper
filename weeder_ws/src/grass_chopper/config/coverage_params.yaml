# ============================================================================
# カバレッジ走行パラメータ設定 (Phase 4c)
# ============================================================================
# coverage_commander_node のパラメータ。
# region で指定した矩形領域を Boustrophedon パターンで走行する。
# 障害物がある場合は obstacle_0, obstacle_1, ... で頂点座標を指定する。
# ============================================================================

coverage_commander_node:
  ros__parameters:
    use_sim_time: true
    # カバレッジ対象領域 [min_x, min_y, max_x, max_y] (map 座標系)
    # 注意: map フレームの原点はロボットの初期位置 (world の -3.5, -3.5)
    # coverage_test.world (8m x 8m) の壁内側に収まるように設定
    # 統合テスト向けにロボット近傍の小領域で検証
    region: [0.5, 0.5, 4.0, 4.0]
    # 作業幅 [m] (統合テスト用に広め)
    swath_width: 1.0
    # 境界マージン [m] (壁からの安全距離)
    margin: 0.3
    # 走行方向 [rad] (0 = 東西方向のストライプ)
    direction: 0.0
    # --- 障害物設定 ---
    # num_obstacles: 障害物の数 (0 = 障害物なし)
    num_obstacles: 0
    # 各障害物は obstacle_N パラメータで頂点座標を指定
    # フラット配列 [x1, y1, x2, y2, x3, y3, ...] (最低 3 頂点=6 座標)
    # 座標は map フレーム
    # 例: 1m×1m の正方形障害物 (中心: (2.0, 2.0))
    # obstacle_0: [1.5, 1.5, 2.5, 1.5, 2.5, 2.5, 1.5, 2.5]
    # --- 再走行 (remow) 設定 ---
    # 刈り残し再走行を有効化 (coverage_tracker_node の起動が必要)
    enable_remow: false
    # 再走行対象の最小面積 [m²] (これ以下の刈り残しは無視)
    remow_min_area: 0.5
    # 再走行の最大回数
    remow_max_iterations: 1
