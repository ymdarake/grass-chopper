# ============================================================================
# apriltag_ros パラメータ
# ============================================================================
# AprilTag 36h11 ファミリーのタグを検出する。
# VM ソフトウェアレンダリング環境に合わせて image_transport: raw を使用。
# ============================================================================
apriltag_node:
  ros__parameters:
    image_transport: raw        # VM では圧縮展開の CPU 負荷を避ける
    family: "36h11"
    size: 0.15                  # タグの 1 辺 [m]
    max_hamming_distance: 0
    profile: false
    # 検出するタグ一覧
    tag.ids: [0]
    tag.sizes: [0.15]
    tag.frames: ["dock_tag"]
