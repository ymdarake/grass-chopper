# ============================================================================
# opennav_docking パラメータ
# ============================================================================
# SimpleChargingDock プラグインで AprilTag 検出によるドッキングを行う。
# VM 低負荷環境 (ソフトウェアレンダリング) に合わせて controller_frequency を下げる。
# ============================================================================
docking_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 5.0       # VM 低負荷向け (デフォルト 50Hz は高すぎる)
    initial_perception_timeout: 5.0  # タグ検出タイムアウト [s]
    wait_charge_timeout: 5.0         # 充電開始待ちタイムアウト [s]
    dock_approach_timeout: 30.0      # ドック接近タイムアウト [s]
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "base_link"
    fixed_frame: "odom"
    dock_plugins: ["charging_dock"]
    dock_database: ["charging_dock_1"]

    charging_dock:
      plugin: "opennav_docking::SimpleChargingDock"
      docking_threshold: 0.05       # ドッキング完了距離 [m]
      staging_x_offset: -0.7        # ドック手前の待機位置 [m]
      staging_yaw_offset: 0.0

      # AprilTag TF を外部検出ポーズとして使用
      use_external_detection_pose: true
      external_detection_timeout: 1.0
      external_detection_translation_x: 0.0
      external_detection_translation_y: 0.0
      external_detection_rotation_yaw: -1.5708    # タグフレーム → ドック正面補正
      external_detection_rotation_pitch: 0.0
      external_detection_rotation_roll: -1.5708

      # ドッキング時の速度制限 (VM 低速動作)
      max_linear_velocity: 0.1
      min_linear_velocity: 0.02
      max_angular_velocity: 0.2
      min_angular_velocity: 0.02

    # ドックデータベース: 既知のドック位置を登録
    charging_dock_1:
      type: "charging_dock"
      frame: "map"
      pose: [7.0, 0.0, 0.0]        # map 座標 (充電ステーション位置)

lifecycle_manager_docking:
  ros__parameters:
    use_sim_time: true
    autostart: true
    bond_timeout: 300.0
    node_names: ["docking_server"]
